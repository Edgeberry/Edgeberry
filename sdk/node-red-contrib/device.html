<script type="text/javascript">
  RED.nodes.registerType('edgeberry_device_device',{
    category: 'Edgeberry Device',
    color: "#FDFDFD",
    defaults: {
      name: {value:""}
    },
    inputs:1,
    outputs:1,
    icon: "Edgeberry_logo.png",
    label: function() {
      return this.name || "Device";
    },
    paletteLabel: "device"
  });
</script>

<script type="text/html" data-template-name="edgeberry_device_device">
  <div class="form-row">
    <label for="node-input-name"><i class="icon-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
</script>

<script type="text/html" data-help-name="edgeberry_device_device">
  <p>This node interacts with the Edgeberry Device Software over DBus.</p>
  
  <p>All operations are dispatched by <code>msg.topic</code>.</p>

  <h3>Send Telemetry/Messages</h3>
  <p>Set <code>msg.topic = "telemetry"</code> (or <code>"message"</code>) and pass data in <code>msg.payload</code>:</p>
  <pre>msg.topic   = "telemetry";
msg.payload = { temperature: 22.5, humidity: 45 };</pre>

  <h3>Set Application Info</h3>
  <pre>msg.topic   = "info";
msg.payload = { name: "MyApp", version: "1.0", description: "desc" };</pre>

  <h3>Set Application Status</h3>
  <pre>msg.topic   = "status";
msg.payload = { level: "ok" | "warning" | "error" | "critical" | "emergency", message: "string" };</pre>
  <p>
    A <code>critical</code> level makes the device flash red rapidly and emit
    a short beep once per second until the status is cleared.
    <code>emergency</code> is one step above: very fast red flashing and a rapid
    staccato of short beeps.
  </p>

  <h3>Trigger Identify</h3>
  <pre>msg.topic = "identify";</pre>
</script>
